<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#grad3)" stroke="#FFD700" stroke-width="4"/>

  <!-- Face -->
  <circle cx="128" cy="128" r="80" fill="#8B4513"/>

  <!-- Eyes (winking) -->
  <circle cx="151" cy="115" r="8" fill="#000"/>
  <path d="M 95 115 Q 105 108 115 115" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>

  <!-- Big smile -->
  <path d="M 95 140 Q 128 170 161 140" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>

  <!-- Hair (Short cut) -->
  <ellipse cx="128" cy="75" rx="60" ry="35" fill="#000"/>

  <!-- Label: K for Kwame -->
  <text x="128" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFD700" text-anchor="middle">KWAME</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEC8B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>