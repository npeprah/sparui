<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#grad5)" stroke="#FFD700" stroke-width="4"/>

  <!-- Face -->
  <circle cx="128" cy="128" r="80" fill="#8B4513"/>

  <!-- Wise eyes -->
  <circle cx="105" cy="115" r="6" fill="#000"/>
  <circle cx="151" cy="115" r="6" fill="#000"/>
  <!-- Eye wrinkles (wisdom lines) -->
  <path d="M 88 110 Q 93 108 95 110" fill="none" stroke="#654321" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 161 110 Q 163 108 168 110" fill="none" stroke="#654321" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Gentle smile -->
  <path d="M 100 145 Q 128 160 156 145" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>

  <!-- Gray hair (Afro style with gray streaks) -->
  <ellipse cx="128" cy="85" rx="55" ry="45" fill="#333"/>
  <ellipse cx="118" cy="80" rx="15" ry="20" fill="#777" opacity="0.7"/>
  <ellipse cx="138" cy="80" rx="15" ry="20" fill="#777" opacity="0.7"/>

  <!-- Label: A for Adjoa -->
  <text x="128" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFD700" text-anchor="middle">ADJOA</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEC8B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>