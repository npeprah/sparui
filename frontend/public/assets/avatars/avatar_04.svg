<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#grad4)" stroke="#8B008B" stroke-width="4"/>

  <!-- Face -->
  <circle cx="128" cy="128" r="80" fill="#8B4513"/>

  <!-- Fierce eyes -->
  <path d="M 95 110 L 110 115 L 95 120" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <path d="M 161 110 L 146 115 L 161 120" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>

  <!-- Determined expression -->
  <path d="M 105 150 L 151 150" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>

  <!-- Hair (Locs style) -->
  <path d="M 88 70 Q 88 100 95 120" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <path d="M 108 65 Q 108 95 113 115" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <path d="M 128 60 Q 128 90 128 110" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <path d="M 148 65 Q 148 95 143 115" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <path d="M 168 70 Q 168 100 161 120" fill="none" stroke="#000" stroke-width="8" stroke-linecap="round"/>

  <!-- Label: Y for Yaa -->
  <text x="128" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFD700" text-anchor="middle">YAA</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9370DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B0082;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>