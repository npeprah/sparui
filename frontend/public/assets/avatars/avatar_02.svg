<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#grad2)" stroke="#4444FF" stroke-width="4"/>

  <!-- Face -->
  <circle cx="128" cy="128" r="80" fill="#8B4513"/>

  <!-- Eyes -->
  <circle cx="105" cy="115" r="8" fill="#000"/>
  <circle cx="151" cy="115" r="8" fill="#000"/>

  <!-- Cool expression -->
  <path d="M 105 145 L 151 145" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>

  <!-- Hair (Braids style) -->
  <rect x="90" y="60" width="15" height="60" rx="5" fill="#000"/>
  <rect x="115" y="60" width="15" height="60" rx="5" fill="#000"/>
  <rect x="140" y="60" width="15" height="60" rx="5" fill="#000"/>

  <!-- Label: A for Ama -->
  <text x="128" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFD700" text-anchor="middle">AMA</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6666FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0000FF;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>